<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olimpia Mundial 2026 🏆</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #38bdf8;
            --accent: #f59e0b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        header { text-align: center; margin-bottom: 20px; }
        header h1 { font-size: 1.6rem; margin: 5px 0; }
        header p { color: var(--primary); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; margin: 0; font-weight: bold; }

        .tabs-menu {
            display: flex;
            background: rgba(0,0,0,0.2);
            padding: 5px;
            border-radius: 10px;
            margin-bottom: 20px;
            gap: 5px;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 10px 5px;
            font-weight: bold;
            font-size: 0.85rem;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .tab-btn.active { background: var(--primary); color: var(--bg-color); }
        .status-bar { background: rgba(56, 189, 248, 0.1); border: 1px solid rgba(56, 189, 248, 0.2); padding: 10px; border-radius: 8px; text-align: center; font-size: 0.85rem; margin-bottom: 20px; color: var(--primary); }
        .content-section { display: flex; flex-direction: column; gap: 10px; }

        /* Filas de Posiciones y Partidos */
        .player-row, .match-row { display: flex; align-items: center; background: rgba(255,255,255,0.03); padding: 12px 15px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .player-row.top-1 { border-color: var(--accent); background: linear-gradient(90deg, rgba(245, 158, 11, 0.1), transparent); }
        .rank { width: 30px; font-weight: bold; font-size: 1.1rem; color: var(--text-muted); }
        .player-row.top-1 .rank { color: var(--accent); }
        .name { flex-grow: 1; font-weight: 500; }
        .score { font-size: 1.2rem; font-weight: bold; color: var(--primary); }
        .player-row.top-1 .score { color: var(--accent); }
        .trend { margin-left: 10px; font-size: 0.9rem; }

        .match-row { justify-content: space-between; }
        .match-info { display: flex; flex-direction: column; }
        .match-title { font-weight: 500; font-size: 0.95rem; }
        .match-phase { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }
        .match-result { background: rgba(255,255,255,0.08); padding: 6px 12px; border-radius: 6px; font-weight: bold; font-size: 0.9rem; color: var(--accent); }

        /* Estilos de la sección de cruces */
        select { width: 100%; padding: 12px; background: rgba(0,0,0,0.3); color: white; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; font-size: 1rem; margin-bottom: 15px; }
        .column-box { background: rgba(255,255,255,0.02); border-radius: 8px; padding: 12px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 10px; }
        .column-title { font-size: 0.85rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .title-a { color: var(--primary); }
        .title-empate { color: var(--text-muted); }
        .title-b { color: var(--accent); }
        .list-names { font-size: 0.9rem; line-height: 1.5; color: #cbd5e1; }

        .loading { text-align: center; padding: 40px; color: var(--text-muted); }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <p>🏆 PLATAFORMA EN VIVO</p>
        <h1>Olimpia Mundial 2026</h1>
    </header>

    <div class="tabs-menu">
        <button class="tab-btn active" onclick="cambiarPestaña('posiciones')">Posiciones</button>
        <button class="tab-btn" onclick="cambiarPestaña('partidos')">Resultados</button>
        <button class="tab-btn" onclick="cambiarPestaña('cruces')">¿Quién va con quién?</button>
    </div>

    <div class="status-bar" id="statusBar">Sincronizando datos...</div>
    <div id="loading" class="loading">Cargando base de datos de Google...</div>
    
    <div id="sec-posiciones" class="content-section" style="display: none;"></div>
    <div id="sec-partidos" class="content-section" style="display: none;"></div>
    
    <!-- Sección Interactiva de Cruces -->
    <div id="sec-cruces" class="content-section" style="display: none;">
        <label for="selectPartido" style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 4px;">Selecciona un Partido para auditar:</label>
        <select id="selectPartido" onchange="mostrarVotosPorPartido()"></select>
        
        <div class="column-box">
            <div class="column-title title-a">Van por el Equipo A</div>
            <div id="lista-gana-a" class="list-names">-</div>
        </div>
        <div class="column-box">
            <div class="column-title title-empate">Van por el Empate</div>
            <div id="lista-empate" class="list-names">-</div>
        </div>
        <div class="column-box">
            <div class="column-title title-b">Van por el Equipo B</div>
            <div id="lista-gana-b" class="list-names">-</div>
        </div>
    </div>
</div>

<script>
    // URL Corregida y limpia de errores de sintaxis
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyN1g4ZdMVJ_VvizdkVwJgso8o2gHx0itxypbrGYyZxdLUkZ98jzgCSOa8p5tOdIGEw/exec";
    let datosGlobales = null;

    async function cargarDatos() {
        try {
            const response = await fetch(WEB_APP_URL);
            datosGlobales = await response.json();
            
            document.getElementById('loading').style.display = 'none';
            
            renderizarRanking(datosGlobales.ranking);
            renderizarPartidos(datosGlobales.partidos);
            configurarSelectorPartidos(datosGlobales.partidos);
            
            cambiarPestaña('posiciones');
            
            const ahora = new Date();
            document.getElementById('statusBar').innerText = `Actualizado a las ${ahora.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
        } catch (error) {
            console.error("Error:", error);
            document.getElementById('loading').innerText = "Error al conectar. Revisa las credenciales de ejecución pública de tu script.";
        }
    }

    function renderizarRanking(ranking) {
        const contenedor = document.getElementById('sec-posiciones');
        contenedor.innerHTML = '';
        ranking.forEach((p, index) => {
            const fila = document.createElement('div');
            const esLider = index === 0;
            fila.className = `player-row ${esLider ? 'top-1' : ''}`;
            let iconoTrend = p.tendencia || '↔️';
            fila.innerHTML = `
                <div class="rank">${esLider ? '👑' : index + 1}</div>
                <div class="name">${p.nombre}</div>
                <div class="score">${p.puntos} <span style="font-size: 0.7rem; color: var(--text-muted)">pts</span></div>
                <div class="trend">${iconoTrend}</div>
            `;
            contenedor.appendChild(fila);
        });
    }

    function renderizarPartidos(partidos) {
        const contenedor = document.getElementById('sec-partidos');
        contenedor.innerHTML = '';
        partidos.forEach(partido => {
            const fila = document.createElement('div');
            fila.className = 'match-row';
            fila.innerHTML = `
                <div class="match-info">
                    <div class="match-title">${partido.partido}</div>
                    <div class="match-phase">ID de juego: <b>${partido.id}</b> | +${partido.puntosFase} pts</div>
                </div>
                <div class="match-result">${partido.resultado}</div>
            `;
            contenedor.appendChild(fila);
        });
    }

    function configurarSelectorPartidos(partidos) {
        const selector = document.getElementById('selectPartido');
        selector.innerHTML = '';
        partidos.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p.id;
            opt.innerText = `${p.id} - ${p.partido}`;
            selector.appendChild(opt);
        });
        mostrarVotosPorPartido();
    }

    function mostrarVotosPorPartido() {
        const idPartidoSeleccionado = document.getElementById('selectPartido').value;
        
        let ganaA = [];
        let empate = [];
        let ganaB = [];

        datosGlobales.predicciones.forEach(p => {
            let voto = p.elecciones[idPartidoSeleccionado];
            if (voto) {
                let votoLimpio = voto.toUpperCase().trim();
                if (votoLimpio.includes("GANA A") || votoLimpio === "LOCAL") ganaA.push(p.nombre);
                else if (votoLimpio.includes("EMPATE")) empate.push(p.nombre);
                else if (votoLimpio.includes("GANA B") || votoLimpio === "VISITANTE") ganaB.push(p.nombre);
            }
        });

        document.getElementById('lista-gana-a').innerHTML = ganaA.length > 0 ? ganaA.join(', ') : "<span style='color:var(--text-muted)'>Nadie</span>";
        document.getElementById('lista-empate').innerHTML = empate.length > 0 ? empate.join(', ') : "<span style='color:var(--text-muted)'>Nadie</span>";
        document.getElementById('lista-gana-b').innerHTML = ganaB.length > 0 ? ganaB.join(', ') : "<span style='color:var(--text-muted)'>Nadie</span>";
    }

    function cambiarPestaña(pestaña) {
        const btns = document.querySelectorAll('.tab-btn');
        const secPosiciones = document.getElementById('sec-posiciones');
        const secPartidos = document.getElementById('sec-partidos');
        const secCruces = document.getElementById('sec-cruces');

        btns.forEach(b => b.classList.remove('active'));
        secPosiciones.style.display = 'none';
        secPartidos.style.display = 'none';
        secCruces.style.display = 'none';

        if (pestaña === 'posiciones') {
            btns[0].classList.add('active');
            secPosiciones.style.display = 'flex';
        } else if (pestaña === 'partidos') {
            btns[1].classList.add('active');
            secPartidos.style.display = 'flex';
        } else {
            btns[2].classList.add('active');
            secCruces.style.display = 'flex';
        }
    }

    cargarDatos();
</script>

</body>
</html>
